<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #6d28d9;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .label {
      color: #666;
      font-size: 12px;
    }
    .value {
      font-weight: 600;
    }
    #state {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .state-idle     { background: #e5e7eb; color: #374151; }
    .state-running  { background: #dbeafe; color: #1d4ed8; }
    .state-done     { background: #d1fae5; color: #065f46; }
    .state-error    { background: #fee2e2; color: #991b1b; }

    .btn-reset {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      background: #e5e7eb;
      color: #374151;
    }
    .btn-reset:hover { background: #d1d5db; }
  </style>
</head>
<body>
  <h2>Renfe Easy Booking</h2>
  <div class="row">
    <span class="label">Estado:</span>
    <span id="state" class="state-idle">-</span>
  </div>
  <div class="row">
    <span class="label">Ida:</span>
    <span id="outbound" class="value">-</span>
  </div>
  <div class="row">
    <span class="label">Vuelta:</span>
    <span id="return" class="value">-</span>
  </div>
  <button class="btn-reset" id="reset-btn">Reiniciar estado</button>

  <script src="popup.js"></script>
</body>
</html>
