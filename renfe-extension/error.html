<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .dialog {
      background: white;
      border-radius: 12px;
      padding: 24px 28px;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      color: #6d28d9;
      margin-bottom: 12px;
      user-select: none;
    }
    .body {
      font-size: 14px;
      color: #1a1a1a;
      white-space: pre-wrap;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    button {
      display: block;
      width: 100%;
      padding: 10px;
      background: #6d28d9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="dialog">
    <div class="title">Renfe Easy Booking</div>
    <div class="body" id="msg"></div>
    <button id="ok">OK</button>
  </div>
  <script src="error.js"></script>
</body>
</html>
